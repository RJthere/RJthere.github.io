function renderMatches() {
  const now = new Date();
  // Wir blenden Spiele 110 Minuten (1h 50m) nach Anpfiff aus
  const matchDurationMs = 110 * 60 * 1000; 

  // 1. Vergangene Spiele herausfiltern
  const upcoming = matches.filter(m => {
    const matchTime = new Date(m.time);
    return (matchTime.getTime() + matchDurationMs) > now.getTime();
  });

  // 2. Auf exakt 8 Spiele für die perfekte Bildschirmgröße begrenzen
  const displayMatches = upcoming.slice(0, 8);
  const tbody = document.createElement("tbody");

  displayMatches.forEach(m => {
    const matchTime = new Date(m.time);
    // Ein Spiel gilt als "Live", wenn die Anstoßzeit erreicht, aber die 110 Minuten noch nicht um sind
    const isLive = matchTime <= now && (matchTime.getTime() + matchDurationMs) > now.getTime();
    
    const day = String(matchTime.getDate()).padStart(2, '0');
    const month = String(matchTime.getMonth() + 1).padStart(2, '0');
    const hours = String(matchTime.getHours()).padStart(2, '0');
    const minutes = String(matchTime.getMinutes()).padStart(2, '0');
    
    const timeHtml = isLive 
      ? '<span class="live">🔴 LIVE</span>' 
      : `${day}.${month}.<br>${hours}:${minutes}`;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="date-time">${timeHtml}</td>
      <td>
        <div class="match">${m.match}</div>
        <div class="venue">${m.venue}</div>
      </td>
      <td class="tv">${m.tv}</td>
    `;
    tbody.appendChild(tr);
  });

  const table = document.getElementById("match-table");
  table.innerHTML = "";
  table.appendChild(tbody);
}

// Sofort beim Öffnen laden

// Alle 60 Sekunden aktualisieren. So verschwinden Spiele automatisch, wenn du die App offen lässt.
setInterval(renderMatches, 60000);
