<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sauerteig Perfektions-Rechner</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #d4a373; /* Warmer Brotfarbton */
            --accent-hover: #faedcd;
            --error: #cf6679;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #2c2c2c;
            color: #fff;
            font-size: 1rem;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            background-color: #2c2c2c;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .radio-option:has(input:checked) {
            border-color: var(--accent);
            background-color: #382c22;
        }

        .radio-option input {
            margin-right: 10px;
            accent-color: var(--accent);
            transform: scale(1.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: #121212;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .hidden {
            display: none;
        }

        #resultSection {
            border-left: 4px solid var(--accent);
        }

        .result-title {
            color: var(--accent);
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .guide-box {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
            font-size: 0.95rem;
        }

        .guide-box h3 {
            color: var(--text-muted);
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .guide-box ul {
            padding-left: 20px;
            margin-bottom: 15px;
        }

        .guide-box li {
            margin-bottom: 5px;
        }
        
        .error {
            color: var(--error);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sauerteig Rechner</h1>

    <div class="card">
        <label for="type">Welchen Sauerteig nutzt du?</label>
        <select id="type">
            <option value="lm">Lievito Madre (fester Weizensauer)</option>
            <option value="roggen">Roggenvollkornsauerteig (100% Hydratation)</option>
        </select>

        <label>Was möchtest du berechnen?</label>
        <div class="radio-group">
            <label class="radio-option">
                <input type="radio" name="calcMode" value="time" checked onchange="updateInputs()">
                Zeit (Dauer bis zur Reife)
            </label>
            <label class="radio-option">
                <input type="radio" name="calcMode" value="temp" onchange="updateInputs()">
                Temperatur (Umgebung/Teig)
            </label>
            <label class="radio-option">
                <input type="radio" name="calcMode" value="ratio" onchange="updateInputs()">
                Verhältnis (Mehlmenge)
            </label>
        </div>

        <div id="inputGroupRatio" class="input-group">
            <label for="valRatio">Teile Mehl auf 1 Teil Anstellgut <br><small style="color:var(--text-muted); font-weight:normal;">(z.B. "5" für 1:5:5)</small></label>
            <input type="number" id="valRatio" placeholder="z.B. 2 oder 5" step="0.5" min="0.5">
        </div>

        <div id="inputGroupTemp" class="input-group">
            <label for="valTemp">Temperatur in °C</label>
            <input type="number" id="valTemp" placeholder="z.B. 25" step="0.5">
        </div>

        <div id="inputGroupTime" class="input-group hidden">
            <label for="valTime">Gewünschte Zeit in Stunden</label>
            <input type="number" id="valTime" placeholder="z.B. 12" step="0.5">
        </div>

        <button onclick="calculate()">Berechnen</button>
    </div>

    <div id="resultSection" class="card hidden">
        <div class="result-title" id="mainResult"></div>
        
        <div class="guide-box">
            <h3>Kurzanleitung & Parameter:</h3>
            <ul id="guideList">
                </ul>
        </div>
    </div>
</div>

<script>
    function updateInputs() {
        const mode = document.querySelector('input[name="calcMode"]:checked').value;
        
        document.getElementById('inputGroupRatio').classList.toggle('hidden', mode === 'ratio');
        document.getElementById('inputGroupTemp').classList.toggle('hidden', mode === 'temp');
        document.getElementById('inputGroupTime').classList.toggle('hidden', mode === 'time');
    }

    function calculate() {
        const type = document.getElementById('type').value;
        const mode = document.querySelector('input[name="calcMode"]:checked').value;
        
        let R = parseFloat(document.getElementById('valRatio').value);
        let Temp = parseFloat(document.getElementById('valTemp').value);
        let Time = parseFloat(document.getElementById('valTime').value);
        
        const resultSection = document.getElementById('resultSection');
        const mainResult = document.getElementById('mainResult');
        
        // Mathematische Konstanten für die Näherung
        // T_base = Referenzzeit bei 1:1 Verhältnis und Referenztemperatur
        const T_base = 4.0; 
        const T_ref = type === 'lm' ? 28 : 25; // LM mag es wärmer, Roggen hat sein Optimum bei ~25-28

        try {
            if (mode === 'time') {
                if (isNaN(R) || isNaN(Temp)) throw "Bitte fülle Verhältnis und Temperatur aus.";
                if (R < 0.5) throw "Das Verhältnis sollte mindestens 0.5 sein.";
                
                // Formel: t = T_base * (1 + 1.2 * ln(R)) * 1.1^(T_ref - Temp)
                // Q10-Faktor genähert durch Basis 1.1 pro Grad Celsius
                Time = T_base * (1 + 1.2 * Math.log(R)) * Math.pow(1.1, T_ref - Temp);
                mainResult.innerHTML = `Erwartete Reifezeit: <strong>${Math.round(Time * 10) / 10} Stunden</strong>`;
                
            } else if (mode === 'temp') {
                if (isNaN(R) || isNaN(Time)) throw "Bitte fülle Verhältnis und Zeit aus.";
                if (R < 0.5) throw "Das Verhältnis sollte mindestens 0.5 sein.";
                
                let baseFactor = T_base * (1 + 1.2 * Math.log(R));
                if (Time / baseFactor <= 0) throw "Kombination nicht möglich.";
                
                Temp = T_ref - (Math.log(Time / baseFactor) / Math.log(1.1));
                mainResult.innerHTML = `Benötigte Temperatur: <strong>${Math.round(Temp * 10) / 10} °C</strong>`;
                
            } else if (mode === 'ratio') {
                if (isNaN(Temp) || isNaN(Time)) throw "Bitte fülle Temperatur und Zeit aus.";
                
                let val = Time / (T_base * Math.pow(1.1, T_ref - Temp));
                let logR = (val - 1) / 1.2;
                R = Math.exp(logR);
                
                if (R < 0.5) {
                    R = 0.5;
                    mainResult.innerHTML = `Empfohlenes Verhältnis: <strong>1 : 0.5</strong> <br><span style="font-size:0.9rem; color:var(--error);">Achtung: Zeit ist sehr kurz oder Temperatur sehr hoch. 1:0.5 ist das Minimum.</span>`;
                } else {
                    mainResult.innerHTML = `Empfohlenes Mehl-Verhältnis: <strong>1 : ${Math.round(R * 10) / 10}</strong>`;
                }
            }

            generateGuide(type, R, Temp);
            resultSection.classList.remove('hidden');

        } catch (e) {
            mainResult.innerHTML = `<span class="error">${e}</span>`;
            document.getElementById('guideList').innerHTML = "";
            resultSection.classList.remove('hidden');
        }
    }

    function generateGuide(type, ratio, temp) {
        const guideList = document.getElementById('guideList');
        guideList.innerHTML = "";
        
        let ratioStr = (Math.round(ratio * 10) / 10).toString().replace('.', ',');
        let tempStr = Math.round(temp);
        
        // Wassertemperatur (Faustregel: Zieltemperatur * 2 - Raum/Mehltemperatur)
        // Angenommen Raumtemperatur/Mehl = 21°C
        let waterTemp = (temp * 2) - 21;
        if (waterTemp < 10) waterTemp = 10; // Untergrenze Leitungswasser
        if (waterTemp > 45) waterTemp = 45; // Obergrenze vor Hefetod

        if (type === 'lm') {
            let waterRatio = Math.round((ratio * 0.5) * 10) / 10;
            addGuideItem(`<strong>Mischverhältnis (ASG : Mehl : Wasser):</strong> 1 : ${ratioStr} : ${waterRatio.toString().replace('.', ',')}`);
            addGuideItem(`<strong>Österreichische Mehltypen:</strong> Weizenmehl Type W700 oder W480 (glatt). Für besonders starken Trieb idealerweise mit backstarkem Mehl (Manitoba) mischen.`);
            addGuideItem(`<strong>Wassertemperatur:</strong> ca. ${Math.round(waterTemp)} °C (um eine Teigtemperatur von ${tempStr} °C bei ca. 21°C Raumtemperatur zu erreichen).`);
            addGuideItem(`<strong>Anleitung:</strong> Zutaten fest verkneten. Zu einer Kugel formen, kreuzweise einschneiden und in ein hohes Gefäß geben. Er ist backbereit, wenn er sich im Volumen verdoppelt bis verdreifacht hat.`);
        } else {
            addGuideItem(`<strong>Mischverhältnis (ASG : Mehl : Wasser):</strong> 1 : ${ratioStr} : ${ratioStr}`);
            addGuideItem(`<strong>Österreichische Mehltypen:</strong> Roggenvollkornmehl (ideal für kräftige Kulturen) oder Roggenmehl Type R960.`);
            addGuideItem(`<strong>Wassertemperatur:</strong> ca. ${Math.round(waterTemp)} °C (um eine Zieltemperatur von ${tempStr} °C bei ca. 21°C Raumtemperatur zu erreichen).`);
            addGuideItem(`<strong>Anleitung:</strong> Gründlich vermischen und Ränder im Glas säubern. Er ist backbereit, wenn er sich deutlich gewölbt hat, von Bläschen durchzogen ist und angenehm säuerlich-fruchtig riecht.`);
        }
    }

    function addGuideItem(htmlContent) {
        const li = document.createElement('li');
        li.innerHTML = htmlContent;
        document.getElementById('guideList').appendChild(li);
    }
</script>

</body>
</html>
