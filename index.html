<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sauerteig Rechner Pro</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --surface-color-light: #2c2c2c;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-color: #e9bc47;
            --accent-hover: #d4a330;
            --border-radius: 12px;
            --error-color: #cf6679;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
        }

        h1, h2 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 24px;
        }

        .card {
            background-color: var(--surface-color);
            padding: 24px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            background-color: var(--surface-color-light);
            border: 1px solid #333;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            margin-bottom: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--accent-color);
        }
        
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .input-group input {
            margin-bottom: 0;
            border-radius: 8px 0 0 8px;
            border-right: none;
        }
        
        .input-group .unit {
            background-color: #333;
            padding: 12px 16px;
            border: 1px solid #333;
            border-left: none;
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-weight: bold;
        }

        .warning {
            color: var(--error-color);
            font-size: 0.85em;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
        }

        .result-box {
            background-color: rgba(233, 188, 71, 0.08);
            border-left: 4px solid var(--accent-color);
            padding: 16px 20px;
            margin-top: 10px;
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
            display: none;
        }

        .result-box h3 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1.1em;
            margin-bottom: 12px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-item .label {
            font-size: 0.8em;
            color: var(--text-secondary);
            display: block;
        }

        .info-item .value {
            font-size: 1.1em;
            font-weight: bold;
            color: #fff;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: center;
            margin-top: 15px;
        }

        .calc-item {
            background-color: var(--surface-color-light);
            padding: 12px 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .calc-value {
            display: block;
            font-size: 1.3em;
            font-weight: bold;
            color: var(--accent-color);
        }

        .calc-label {
            font-size: 0.85em;
            color: var(--text-secondary);
        }
        
        .hint {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-top: 15px;
            line-height: 1.4;
        }

        hr {
            border: 0;
            height: 1px;
            background: #333;
            margin: 24px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sauerteig Architektur</h1>

    <div class="card">
        <label for="sourdoughType">1. Welchen Sauerteig nutzt du?</label>
        <select id="sourdoughType">
            <option value="" disabled selected>Bitte wählen...</option>
            <option value="lm">Lievito Madre (Weizen, fest)</option>
            <option value="rvk">Roggenvollkornsauerteig</option>
        </select>

        <div id="varSelectionGroup" style="display: none;">
            <label for="knownVar">2. Was ist deine exakte Vorgabe?</label>
            <select id="knownVar">
                <option value="" disabled selected>Bitte wählen...</option>
                <option value="time">Zeit (Wie lange soll er reifen?)</option>
                <option value="temp">Temperatur (Wo steht der Teig?)</option>
                <option value="ratio">Mehlmenge (Fütterungsverhältnis)</option>
            </select>
        </div>

        <div id="valueInputGroup" style="display: none;">
            <label id="inputLabel" for="exactValue">3. Gib deinen Wert ein:</label>
            <div class="input-group">
                <input type="number" id="exactValue" step="0.5">
                <span id="inputUnit" class="unit"></span>
            </div>
            <div id="limitWarning" class="warning">Wert außerhalb des optimalen Bereichs. Wird angepasst.</div>
        </div>
    </div>

    <div id="parameterResult" class="result-box">
        <h3>Dein perfektioniertes Profil</h3>
        <div class="info-grid">
            <div class="info-item">
                <span class="label">Reifezeit</span>
                <span class="value" id="outTime"></span>
            </div>
            <div class="info-item">
                <span class="label">Umgebungstemperatur</span>
                <span class="value" id="outTemp"></span>
            </div>
            <div class="info-item" style="grid-column: span 2;">
                <span class="label">Verhältnis (ASG : Mehl : Wasser)</span>
                <span class="value" id="outRatio" style="color: var(--accent-color);"></span>
            </div>
        </div>
        <hr style="margin: 12px 0;">
        <div class="hint">
            <strong>Mehl (Österreich):</strong> <span id="outFlour"></span><br><br>
            <strong>Wassertemperatur:</strong> <span id="outWaterTemp"></span>
        </div>
    </div>

    <div id="calculatorSection" class="card" style="display: none; margin-top: 20px;">
        <h2>Zielmenge berechnen</h2>
        <label for="targetAmount">Wie viel Sauerteig brauchst du insgesamt? (in Gramm)</label>
        <input type="number" id="targetAmount" placeholder="z.B. 150" min="10">

        <div id="amountsResult" class="calc-grid" style="display: none;">
            <div class="calc-item">
                <span class="calc-value" id="calcAsg">0g</span>
                <span class="calc-label">Anstellgut</span>
            </div>
            <div class="calc-item">
                <span class="calc-value" id="calcFlour">0g</span>
                <span class="calc-label">Mehl</span>
            </div>
            <div class="calc-item">
                <span class="calc-value" id="calcWater">0g</span>
                <span class="calc-label">Wasser</span>
            </div>
        </div>
        <p style="text-align: center; font-size: 0.85em; color: var(--text-secondary); margin-top: 15px;">
            Ergibt exakt: <span id="calcTotal" style="color:#fff; font-weight:bold;">0</span>g
        </p>
    </div>
</div>

<script>
    // --- WISSENSCHAFTLICHE BASISDATEN ---
    // Diese Datenpunkte markieren die sicheren biologischen Grenzen. 
    // Das System interpoliert (berechnet die Kurve) zwischen diesen Punkten.
    const doughData = {
        lm: {
            flourType: "Weizenmehl Type W700 oder W480 (glatt)",
            waterFactor: 0.5, // LM hat immer 50% Hydration (Wasser = halbes Mehl)
            points: [
                { time: 4, temp: 30, ratio: 1 },  // Warm & Schnell: 1:1:0.5
                { time: 8, temp: 25, ratio: 2 },  // Medium: 1:2:1
                { time: 16, temp: 20, ratio: 4 }  // Kühl & Langsam: 1:4:2
            ]
        },
        rvk: {
            flourType: "Roggenvollkornmehl (oder R960)",
            waterFactor: 1.0, // RVK hat 100% Hydration (Wasser = Mehl)
            points: [
                { time: 4, temp: 30, ratio: 1 },  // Warm & Schnell: 1:1:1
                { time: 12, temp: 24, ratio: 5 }, // Medium: 1:5:5
                { time: 24, temp: 20, ratio: 12 } // Kühl & Langsam: 1:12:12
            ]
        }
    };

    // DOM Elements
    const typeSelect = document.getElementById('sourdoughType');
    const varSelectionGroup = document.getElementById('varSelectionGroup');
    const varSelect = document.getElementById('knownVar');
    
    const valueInputGroup = document.getElementById('valueInputGroup');
    const inputLabel = document.getElementById('inputLabel');
    const exactValueInput = document.getElementById('exactValue');
    const inputUnit = document.getElementById('inputUnit');
    const limitWarning = document.getElementById('limitWarning');
    
    const parameterResult = document.getElementById('parameterResult');
    const calculatorSection = document.getElementById('calculatorSection');
    const targetAmountInput = document.getElementById('targetAmount');
    const amountsResult = document.getElementById('amountsResult');

    // Aktueller State
    let currentCalc = { time: 0, temp: 0, ratio: 0, waterFactor: 1 };

    // --- LOGIK FÜR INTERPOLATION ---
    // Berechnet exakte Zwischenwerte auf Basis der biologischen Stützpunkte
    function interpolate(val, inKey, outKey, pts) {
        let sorted = [...pts].sort((a, b) => a[inKey] - b[inKey]);
        
        // Clamping (Sicherheitsgrenzen)
        if (val <= sorted[0][inKey]) return sorted[0][outKey];
        if (val >= sorted[sorted.length-1][inKey]) return sorted[sorted.length-1][outKey];
        
        // Interpolation
        for (let i = 0; i < sorted.length - 1; i++) {
            if (val >= sorted[i][inKey] && val <= sorted[i+1][inKey]) {
                let x0 = sorted[i][inKey], y0 = sorted[i][outKey];
                let x1 = sorted[i+1][inKey], y1 = sorted[i+1][outKey];
                return y0 + (val - x0) * (y1 - y0) / (x1 - x0);
            }
        }
    }

    // --- EVENT LISTENERS ---
    typeSelect.addEventListener('change', () => {
        varSelectionGroup.style.display = 'block';
        resetResults();
        if(varSelect.value) setupInputField(); 
    });

    varSelect.addEventListener('change', () => {
        setupInputField();
        resetResults();
    });

    exactValueInput.addEventListener('input', calculateProfile);
    targetAmountInput.addEventListener('input', calculateAmounts);

    // --- FUNKTIONEN ---
    function setupInputField() {
        const knownVar = varSelect.value;
        const type = typeSelect.value;
        if (!knownVar || !type) return;

        let pts = doughData[type].points;
        let min, max, placeholder, label, unit;

        // Min und Max für den jeweiligen Datentyp dynamisch ermitteln
        let times = pts.map(p => p.time);
        let temps = pts.map(p => p.temp);
        let ratios = pts.map(p => p.ratio);

        if (knownVar === 'time') {
            min = Math.min(...times); max = Math.max(...times);
            label = "Gewünschte Reifezeit (Stunden):";
            unit = "h";
            placeholder = `z.B. ${Math.round((min+max)/2)}`;
        } else if (knownVar === 'temp') {
            min = Math.min(...temps); max = Math.max(...temps);
            label = "Raumtemperatur:";
            unit = "°C";
            placeholder = `z.B. 24`;
        } else if (knownVar === 'ratio') {
            min = Math.min(...ratios); max = Math.max(...ratios);
            label = "Mehl-Anteil (z.B. 5 für 1:5:Wasser):";
            unit = "Teile";
            placeholder = `z.B. ${Math.round((min+max)/2)}`;
        }

        inputLabel.textContent = label;
        inputUnit.textContent = unit;
        exactValueInput.min = min;
        exactValueInput.max = max;
        exactValueInput.placeholder = placeholder;
        exactValueInput.value = '';
        
        valueInputGroup.style.display = 'block';
    }

    function calculateProfile() {
        const type = typeSelect.value;
        const knownVar = varSelect.value;
        let val = parseFloat(exactValueInput.value);

        if (isNaN(val)) {
            parameterResult.style.display = 'none';
            calculatorSection.style.display = 'none';
            return;
        }

        let pts = doughData[type].points;
        const minVal = parseFloat(exactValueInput.min);
        const maxVal = parseFloat(exactValueInput.max);

        // Warnung bei Überschreiten der sicheren biologischen Grenzen
        if (val < minVal || val > maxVal) {
            limitWarning.style.display = 'block';
            val = Math.max(minVal, Math.min(val, maxVal)); // Wert auf Grenze fixieren
        } else {
            limitWarning.style.display = 'none';
        }

        // Andere Variablen per Interpolation berechnen
        if (knownVar === 'time') {
            currentCalc.time = val;
            currentCalc.temp = interpolate(val, 'time', 'temp', pts);
            currentCalc.ratio = interpolate(val, 'time', 'ratio', pts);
        } else if (knownVar === 'temp') {
            currentCalc.temp = val;
            currentCalc.time = interpolate(val, 'temp', 'time', pts);
            currentCalc.ratio = interpolate(val, 'temp', 'ratio', pts);
        } else if (knownVar === 'ratio') {
            currentCalc.ratio = val;
            currentCalc.time = interpolate(val, 'ratio', 'time', pts);
            currentCalc.temp = interpolate(val, 'ratio', 'temp', pts);
        }

        currentCalc.waterFactor = doughData[type].waterFactor;
        
        renderProfileInfo();
    }

    function renderProfileInfo() {
        const type = typeSelect.value;
        
        // Werte runden für die Anzeige
        let r = currentCalc.ratio.toFixed(1).replace('.0', '');
        let w = (currentCalc.ratio * currentCalc.waterFactor).toFixed(1).replace('.0', '');
        let t = currentCalc.time.toFixed(1).replace('.0', '');
        let temp = currentCalc.temp.toFixed(1).replace('.0', '');

        document.getElementById('outRatio').textContent = `1 : ${r} : ${w}`;
        document.getElementById('outTime').textContent = `${t} Stunden`;
        document.getElementById('outTemp').textContent = `${temp} °C`;
        
        document.getElementById('outFlour').textContent = doughData[type].flourType;
        
        // Wassertemperatur-Logik
        let waterHint = "";
        if (currentCalc.temp < 22) {
            waterHint = "Nimm gut warmes Wasser (ca. 30-35°C), um dem Teig in der kühlen Umgebung Starthilfe zu geben.";
        } else if (currentCalc.temp > 26) {
            waterHint = "Nimm eher kühleres Raumtemperatur-Wasser (ca. 20-22°C), damit die Hefe nicht überhitzt.";
        } else {
            waterHint = "Handwarmes Wasser (ca. 25-28°C) ist hier optimal.";
        }
        document.getElementById('outWaterTemp').textContent = waterHint;

        parameterResult.style.display = 'block';
        calculatorSection.style.display = 'block';
        
        if(targetAmountInput.value) calculateAmounts();
    }

    function calculateAmounts() {
        const target = parseFloat(targetAmountInput.value);
        
        if (isNaN(target) || target <= 0) {
            amountsResult.style.display = 'none';
            return;
        }

        // Exakte Mengenberechnung (inklusive berechneter Kommastellen aus der Interpolation)
        const partsAsg = 1;
        const partsFlour = currentCalc.ratio;
        const partsWater = currentCalc.ratio * currentCalc.waterFactor;
        
        const totalParts = partsAsg + partsFlour + partsWater;
        const multiplier = target / totalParts;

        // Kaufmännisch runden
        const asg = Math.round(partsAsg * multiplier);
        const flour = Math.round(partsFlour * multiplier);
        
        // Wasser als Differenz zur Zielmenge berechnen (vermeidet Rundungsfehler in der Summe!)
        const water = target - asg - flour;

        document.getElementById('calcAsg').textContent = `${asg}g`;
        document.getElementById('calcFlour').textContent = `${flour}g`;
        document.getElementById('calcWater').textContent = `${water}g`;
        document.getElementById('calcTotal').textContent = target;

        amountsResult.style.display = 'grid';
    }

    function resetResults() {
        parameterResult.style.display = 'none';
        calculatorSection.style.display = 'none';
        amountsResult.style.display = 'none';
        targetAmountInput.value = '';
        exactValueInput.value = '';
        limitWarning.style.display = 'none';
    }
</script>

</body>
</html>
